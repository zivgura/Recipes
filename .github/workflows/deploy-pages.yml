# Build the Vite app and publish dist/ to GitHub Pages.
#
# After pushing:
# 1. Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# 2. Settings → Secrets and variables → Actions:
#    - Add repository secrets matching your VITE_* env (same names as in .env).
# 3. Settings → Secrets and variables → Actions → Variables tab:
#    - VITE_BASE_PATH = /YOUR_REPO_NAME/  (with slashes; only if the site is at
#      https://USER.github.io/YOUR_REPO_NAME/ — omit or use / for a root user site)
#
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_RECIPES_FILE_ID: ${{ secrets.VITE_RECIPES_FILE_ID }}
          VITE_RECIPES_FOLDER_ID: ${{ secrets.VITE_RECIPES_FOLDER_ID }}
          VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
